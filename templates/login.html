<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<style>
body {
    background: #0f172a;
    font-family: Arial;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    color: white;
}

.box {
    background: #1e293b;
    padding: 30px;
    border-radius: 12px;
    width: 300px;
}

input {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
    border-radius: 6px;
    border: none;
}

button {
    width: 100%;
    padding: 10px;
    background: #38bdf8;
    border: none;
    border-radius: 6px;
}
</style>

</head>
<body>

<div class="box">
<h2>🔐 Login</h2>

{% if error %}
<p style="color:red;">{{ error }}</p>
{% endif %}

<form method="POST">
<input name="username" placeholder="Username">
<input name="password" type="password" placeholder="Password">
<button>Login</button>
</form>

</div>

</body>
</html>
