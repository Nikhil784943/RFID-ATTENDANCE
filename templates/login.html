<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<style>
body {
background:linear-gradient(#0f172a,#1e293b);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
font-family:Segoe UI;
}

.box {
background:rgba(255,255,255,0.05);
padding:30px;
border-radius:15px;
}

input {
display:block;
margin:10px 0;
padding:10px;
width:200px;
border:none;
border-radius:8px;
}

button {
padding:10px;
width:100%;
background:#38bdf8;
border:none;
border-radius:8px;
}
</style>
</head>

<body>

<div class="box">
<h2>Login</h2>
<form action="/" method="GET">
<input placeholder="Username" required>
<input type="password" placeholder="Password" required>
<button>Login</button>
</form>
</div>

</body>
</html>
