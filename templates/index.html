<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
</head>
<body>

<h2>Attendance Dashboard</h2>

<p>Total: {{ total }}</p>

<a href="/export">Download Excel</a> |
<a href="/logout">Logout</a>

<table border="1">
<tr>
<th>UID</th>
<th>Name</th>
<th>Time</th>
<th>Date</th>
</tr>

{% for row in data %}
<tr>
<td>{{ row.uid }}</td>
<td>{{ row.name }}</td>
<td>{{ row.time }}</td>
<td>{{ row.date }}</td>
</tr>
{% endfor %}

</table>

</body>
</html>
