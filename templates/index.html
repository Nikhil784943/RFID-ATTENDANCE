<!DOCTYPE html>
<html>
<head>
    <title>RFID Attendance</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: #0f172a;
            color: white;
        }

        header {
            background: #020617;
            padding: 15px 30px;
            font-size: 20px;
            display: flex;
            justify-content: space-between;
        }

        .container {
            padding: 20px;
        }

        .cards {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }

        .card {
            flex: 1;
            background: #1e293b;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 0 15px rgba(0,0,0,0.3);
        }

        .buttons {
            margin-bottom: 15px;
        }

        button {
            padding: 10px 15px;
            margin-right: 10px;
            border: none;
            border-radius: 8px;
            background: #38bdf8;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background: #0ea5e9;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: #1e293b;
            border-radius: 10px;
            overflow: hidden;
        }

        th {
            background: #38bdf8;
            color: black;
            padding: 12px;
        }

        td {
            padding: 10px;
            text-align: center;
        }

        tr:nth-child(even) {
            background: #0f172a;
        }
    </style>
</head>

<body>

<header>
    <div>📡 RFID Attendance System</div>
    <div id="datetime"></div>
</header>

<div class="container">

    <div class="cards">
        <div class="card">
            <h3>Total Records</h3>
            <h2 id="total">0</h2>
        </div>

        <div class="card">
            <h3>Status</h3>
            <h2 style="color: #22c55e;">Live</h2>
        </div>
    </div>

    <div class="buttons">
        <button onclick="exportData()">Export</button>
        <button onclick="location.href='/login'">Logout</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>UID</th>
                <th>Name</th>
                <th>Time</th>
                <th>Date</th>
            </tr>
        </thead>

        <tbody id="table"></tbody>
    </table>

</div>

<script>
function loadData() {
    fetch('/data')
    .then(res => res.json())
    .then(data => {

        let table = "";
        document.getElementById("total").innerText = data.length;

        data.forEach(row => {
            table += `
            <tr>
                <td>${row[0]}</td>
                <td>${row[1]}</td>
                <td>${row[2]}</td>
                <td>${row[3]}</td>
            </tr>`;
        });

        document.getElementById("table").innerHTML = table;
    });
}

// 🔄 Auto refresh
setInterval(loadData, 3000);
loadData();

// 🕒 Date Time
setInterval(() => {
    document.getElementById("datetime").innerText =
        new Date().toLocaleString();
}, 1000);

// 📥 Export CSV
function exportData() {
    window.location.href = "/export";
}
</script>

</body>
</html>
