<!DOCTYPE html>
<html>
<head>
<title>RFID Attendance</title>

<style>
body { background:#0f172a; color:white; font-family:Segoe UI; margin:0; }
header { padding:15px; background:#020617; display:flex; justify-content:space-between; }
.container { padding:20px; }

.card { background:#1e293b; padding:20px; border-radius:15px; flex:1; }
.cards { display:flex; gap:20px; margin-bottom:20px; }

button {
    padding:10px;
    border:none;
    border-radius:8px;
    background:#38bdf8;
    cursor:pointer;
    margin-right:10px;
}

table { width:100%; border-collapse:collapse; }
th { background:#38bdf8; color:black; padding:10px; }
td { padding:10px; text-align:center; }
tr:nth-child(even){ background:#1e293b; }
</style>
</head>

<body>

<header>
    <div>📡 RFID Attendance</div>
    <div id="time"></div>
</header>

<div class="container">

<div class="cards">
    <div class="card">
        <h3>Total</h3>
        <h2 id="total">0</h2>
    </div>
    <div class="card">
        <h3>Status</h3>
        <h2 style="color:green;">Live</h2>
    </div>
</div>

<button onclick="location.href='/clear'">Clear</button>
<button onclick="location.href='/export'">Export</button>
<button onclick="location.href='/login'">Logout</button>

<table>
<thead>
<tr>
<th>UID</th><th>Name</th><th>Time</th><th>Date</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

</div>

<script>
function load(){
fetch('/data')
.then(r=>r.json())
.then(d=>{
document.getElementById("total").innerText=d.length;

let t="";
d.forEach(x=>{
t+=`<tr><td>${x[0]}</td><td>${x[1]}</td><td>${x[2]}</td><td>${x[3]}</td></tr>`;
});
document.getElementById("table").innerHTML=t;
});
}

setInterval(load,3000);
load();

setInterval(()=>{
document.getElementById("time").innerText=new Date().toLocaleString();
},1000);
</script>

</body>
</html>
