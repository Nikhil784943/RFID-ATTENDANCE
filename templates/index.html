<!DOCTYPE html>
<html>
<head>
<title>RFID Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: 'Segoe UI';
    background: #0f172a;
    color: white;
}

header {
    background: #1e293b;
    padding: 15px;
    text-align: center;
    color: #38bdf8;
}

#clock {
    font-size: 14px;
    margin-top: 5px;
}

.container {
    padding: 20px;
}

.cards {
    display: flex;
    gap: 20px;
}

.card {
    background: #1e293b;
    padding: 20px;
    border-radius: 12px;
    flex: 1;
}

.actions a {
    background: #38bdf8;
    padding: 8px 12px;
    border-radius: 6px;
    color: black;
    text-decoration: none;
    margin-right: 10px;
}

table {
    width: 100%;
    margin-top: 20px;
    border-collapse: collapse;
    background: #1e293b;
}

th {
    background: #38bdf8;
    color: black;
    padding: 10px;
}

td {
    padding: 10px;
    text-align: center;
}

</style>
</head>

<body>

<header>
    📡 RFID Attendance System
    <div id="clock"></div>
</header>

<div class="container">

<div class="cards">
<div class="card">
<h3>Total</h3>
<p id="total">0</p>
</div>

<div class="card">
<h3>Status</h3>
<p id="status">Live</p>
</div>
</div>

<div class="actions">
<a href="/export">Export</a>
<a href="/logout">Logout</a>
</div>

<table>
<thead>
<tr>
<th>UID</th>
<th>Name</th>
<th>Time</th>
<th>Date</th>
</tr>
</thead>

<tbody id="table"></tbody>
</table>

</div>

<script>
// LIVE CLOCK
function updateClock() {
    let now = new Date();
    document.getElementById("clock").innerText =
        now.toLocaleDateString() + " | " + now.toLocaleTimeString();
}
setInterval(updateClock, 1000);

// LOAD DATA
async function loadData() {
    let res = await fetch('/data');
    let data = await res.json();

    document.getElementById("total").innerText = data.length;

    let table = document.getElementById("table");
    table.innerHTML = "";

    data.forEach(d => {
        table.innerHTML += `
        <tr>
            <td>${d.uid}</td>
            <td>${d.name}</td>
            <td>${d.time}</td>
            <td>${d.date}</td>
        </tr>`;
    });
}

setInterval(loadData, 2000);
loadData();
</script>

</body>
</html>
