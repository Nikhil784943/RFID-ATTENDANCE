<!DOCTYPE html>
<html>
<head>
<title>RFID Attendance</title>

<style>
body {
    background:#0f172a;
    color:white;
    font-family:Segoe UI;
    margin:0;
}

header {
    padding:15px 25px;
    background:#020617;
    display:flex;
    justify-content:space-between;
    align-items:center;
    font-size:18px;
}

.container {
    padding:20px;
}

/* CARDS */
.cards {
    display:flex;
    gap:20px;
    margin-bottom:20px;
    flex-wrap:wrap;
}

.card {
    flex:1;
    background:#1e293b;
    padding:20px;
    border-radius:15px;
    text-align:center;
    box-shadow:0 0 10px rgba(0,0,0,0.3);
}

/* BUTTONS */
.buttons {
    margin-bottom:15px;
}

button {
    padding:10px 15px;
    border:none;
    border-radius:8px;
    background:#38bdf8;
    cursor:pointer;
    margin-right:10px;
    font-weight:bold;
    transition:0.2s;
}

button:hover {
    background:#0ea5e9;
}

/* TABLE */
table {
    width:100%;
    border-collapse:collapse;
    background:#1e293b;
    border-radius:10px;
    overflow:hidden;
}

th {
    background:#38bdf8;
    color:black;
    padding:12px;
}

td {
    padding:10px;
    text-align:center;
}

tr:nth-child(even){
    background:#0f172a;
}

.status-live {
    color:#22c55e;
}

/* MOBILE */
@media(max-width:600px){
    .cards {
        flex-direction:column;
    }
}
</style>
</head>

<body>

<header>
    <div>📡 RFID Attendance System</div>
    <div id="time"></div>
</header>

<div class="container">

<div class="cards">
    <div class="card">
        <h3>Total Records</h3>
        <h2 id="total">0</h2>
    </div>

    <div class="card">
        <h3>Status</h3>
        <h2 class="status-live">Live</h2>
    </div>
</div>

<div class="buttons">
    <button onclick="clearData()">🧹 Clear</button>
    <button onclick="location.href='/export'">📥 Export</button>
    <button onclick="location.href='/logout'">🔐 Logout</button>
</div>

<table>
<thead>
<tr>
<th>UID</th>
<th>Name</th>
<th>Time</th>
<th>Date</th>
</tr>
</thead>

<tbody id="table"></tbody>
</table>

</div>

<script>
// 🔄 Load data
function load(){
fetch('/data')
.then(res => res.json())
.then(data => {

    if(!Array.isArray(data)) return;

    document.getElementById("total").innerText = data.length;

    let rows = "";

    data.forEach(x=>{
        rows += `
        <tr>
            <td>${x[0]}</td>
            <td>${x[1]}</td>
            <td>${x[2]}</td>
            <td>${x[3]}</td>
        </tr>`;
    });

    document.getElementById("table").innerHTML = rows;
})
.catch(err => {
    console.log("Error loading data:", err);
});
}

// 🔄 Auto refresh
setInterval(load, 3000);
load();

// 🕒 Clock
setInterval(()=>{
document.getElementById("time").innerText =
    new Date().toLocaleString();
},1000);

// 🧹 Confirm clear
function clearData(){
    if(confirm("Clear all attendance?")){
        window.location.href = "/clear";
    }
}
</script>

</body>
</html>
